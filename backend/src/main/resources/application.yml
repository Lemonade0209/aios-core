spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aios_core}
    username: ${DATABASE_USERNAME:aios}
    password: ${DATABASE_PASSWORD:aios}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

aios:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-to-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
