services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aios-core-postgres
    environment:
      POSTGRES_DB: aios_core
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
    ports:
      - "5432:5432"
    volumes:
      - aios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios_core"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aios_postgres_data:
